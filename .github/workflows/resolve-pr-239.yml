name: Inspect PR 239 merge conflicts

on:
  push:
    branches:
      - claude/github-issue-186-l1m80x

permissions:
  contents: write

jobs:
  inspect-conflicts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Inspect merge conflicts and persist result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e
          conflicts="$(git diff --name-only --diff-filter=U)"
          status_short="$(git status --short)"
          git merge --abort || true

          {
            echo "MERGE_STATUS=${merge_status}"
            echo "--- unresolved files ---"
            printf '%s\n' "${conflicts}"
            echo "--- git status --short ---"
            printf '%s\n' "${status_short}"
          } > .github/pr239-conflicts.txt

          git add .github/pr239-conflicts.txt
          git commit -m "ci: record PR 239 merge conflicts"
          git push origin HEAD:claude/github-issue-186-l1m80x
