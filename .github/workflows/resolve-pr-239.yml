name: Inspect PR 239 merge conflicts

on:
  push:
    branches:
      - claude/github-issue-186-l1m80x

permissions:
  contents: read
  issues: write

jobs:
  inspect-conflicts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Inspect merge conflicts and report
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e
          conflicts="$(git diff --name-only --diff-filter=U)"
          status_short="$(git status --short)"
          git merge --abort || true

          if [ "${merge_status}" -eq 0 ]; then
            body="<!-- pr239-conflict-inspection -->\nTemporary conflict inspection result: no merge conflicts detected against current main."
          else
            body="<!-- pr239-conflict-inspection -->\nTemporary conflict inspection result against current main.\n\nUnresolved files:\n\`\`\`\n${conflicts}\n\`\`\`\n\nGit status:\n\`\`\`\n${status_short}\n\`\`\`"
          fi

          gh api "repos/${GITHUB_REPOSITORY}/issues/239/comments" -f body="${body}"
