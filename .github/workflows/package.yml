name: Package

# Builds and verifies the electron-builder artifacts from #72 with the #73 signing pipeline
# layered on top. Every signing/notarization step is gated on the corresponding secret being
# present, so a pull request from a fork (which GitHub Actions never exposes repository secrets
# to) automatically takes the unsigned fallback path documented in docs/signing.md — no separate
# "is this a fork" check is needed anywhere below.
#
# Split out from ci.yml (which stays fast/cheap on ubuntu-latest) because macOS/Windows runners
# are materially more expensive; if that cost becomes a concern, gate this workflow's
# `pull_request` trigger behind a label or path filter without touching the job bodies below.
#
# workflow_call (#74): .github/workflows/release.yml invokes this workflow directly instead of
# duplicating the build/sign/verify steps below. `channel` reaches BuildInfo (DOCIAI_RELEASE_CHANNEL,
# see scripts/release/build-info.mjs) so a real release embeds "stable"/"beta" instead of the
# "dev" default every PR/push/workflow_dispatch build gets. `ref` lets a caller pin the exact
# commit to package — required for release.yml's workflow_dispatch path, where `github.ref` alone
# would resolve to whatever branch the run itself was started from, not necessarily the tag being
# released. `upload_packages` additionally uploads the real artifact binaries (zip/dmg/exe), which
# ordinary PR/push runs skip on purpose to avoid paying GitHub Actions storage for every commit.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      channel:
        description: "Release channel embedded into BuildInfo (stable/beta/dev)"
        type: string
        required: false
        default: dev
      ref:
        description: "Explicit ref/commit to check out (defaults to github.ref)"
        type: string
        required: false
        default: ""
      upload_packages:
        description: "Upload the actual packaged artifact binaries, not just checksums/manifest"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: dociai-package-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  package-macos:
    name: package-macos
    runs-on: macos-latest
    # #74 gave this workflow a `workflow_call` trigger, which makes GitHub Actions validate the
    # whole file as a reusable workflow — under that validation, `secrets` is not a recognized
    # named-value inside `if:` conditionals (only inside `env:`/`with:`). Resolve the "is a signing
    # secret present" checks into job-level env vars here and reference those (`env.HAS_*`) in the
    # `if:` conditions below instead of `secrets.*` directly.
    env:
      HAS_MACOS_CERT: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci

      - name: Signing status
        run: node scripts/release/print-signing-status.mjs
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Mask before anything else in this job can touch the raw values.
      - name: Mask macOS signing secrets
        if: ${{ env.HAS_MACOS_CERT == 'true' }}
        run: |
          echo "::add-mask::${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}"
          echo "::add-mask::${{ secrets.MACOS_CERTIFICATE_PASSWORD }}"
          echo "::add-mask::${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"

      - name: Set up temporary keychain
        if: ${{ env.HAS_MACOS_CERT == 'true' }}
        run: scripts/release/setup-macos-keychain.sh setup
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Build + package (arm64 + x64)
        run: npm run electron:package
        env:
          # Signing: CSC_IDENTITY_AUTO_DISCOVERY (default on) finds the identity imported above.
          # Notarization: consumed by scripts/release/notarize.mjs's afterSign hook.
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # #74: empty (every non-workflow_call trigger) falls back to build-info.mjs's own "dev"
          # default via resolveChannel(), so this is a no-op outside release.yml.
          DOCIAI_RELEASE_CHANNEL: ${{ inputs.channel }}

      - name: Verify artifact contents (arm64)
        run: node scripts/release/verify-artifact.mjs dist/release/mac-arm64/dociai.app
      - name: Verify artifact contents (x64)
        run: node scripts/release/verify-artifact.mjs dist/release/mac/dociai.app

      - name: Verify code signature (arm64)
        if: ${{ env.HAS_MACOS_CERT == 'true' }}
        run: scripts/release/verify-macos-signing.sh dist/release/mac-arm64/dociai.app
      - name: Verify code signature (x64)
        if: ${{ env.HAS_MACOS_CERT == 'true' }}
        run: scripts/release/verify-macos-signing.sh dist/release/mac/dociai.app

      - name: Packaged app smoke (host arch)
        env:
          TEST_ARTIFACTS_DIR: ${{ github.workspace }}/test-results/package-macos
        run: node scripts/release/smoke-packaged.mjs

      - name: Checksums + release manifest
        run: node scripts/release/generate-checksums.mjs

      - name: Clean up temporary keychain
        if: always()
        run: scripts/release/setup-macos-keychain.sh cleanup

      - name: Upload checksums + manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-macos-manifest-${{ github.run_id }}
          path: |
            dist/release/*.sha256
            dist/release/release-manifest.json
          if-no-files-found: warn
          retention-days: 14
          overwrite: true
      # #74: skipped on ordinary PR/push/workflow_dispatch runs (inputs.upload_packages is only
      # set true by release.yml) so those keep paying for checksums/manifest only, not the
      # multi-hundred-MB binaries. `overwrite: true` so re-running this same workflow run (rerun
      # failed jobs, or the whole run) never fails on "artifact already exists".
      - name: Upload packaged artifacts
        if: ${{ inputs.upload_packages == true }}
        uses: actions/upload-artifact@v4
        with:
          name: package-macos-artifacts-${{ github.run_id }}
          path: |
            dist/release/*.zip
            dist/release/*.dmg
          if-no-files-found: error
          retention-days: 14
          overwrite: true
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: package-macos-diagnostics-${{ github.run_id }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 14

  package-windows:
    name: package-windows
    runs-on: windows-latest
    # See package-macos's env block above for why this exists (secrets isn't a recognized
    # named-value inside `if:` once the workflow has a `workflow_call` trigger).
    env:
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci

      - name: Signing status
        run: node scripts/release/print-signing-status.mjs
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}

      - name: Mask Windows signing secrets
        if: ${{ env.HAS_WINDOWS_CERT == 'true' }}
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}"
          echo "::add-mask::${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"

      - name: Decode signing certificate
        if: ${{ env.HAS_WINDOWS_CERT == 'true' }}
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64)
          $path = Join-Path $env:RUNNER_TEMP 'dociai-signing.pfx'
          [IO.File]::WriteAllBytes($path, $bytes)
          "CSC_LINK=$path" >> $env:GITHUB_ENV
          "CSC_KEY_PASSWORD=$env:WINDOWS_CERTIFICATE_PASSWORD" >> $env:GITHUB_ENV
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Build + package
        run: npm run electron:package
        env:
          # #74: empty (every non-workflow_call trigger) falls back to build-info.mjs's own "dev"
          # default via resolveChannel(), so this is a no-op outside release.yml.
          DOCIAI_RELEASE_CHANNEL: ${{ inputs.channel }}

      - name: Verify artifact contents
        run: node scripts/release/verify-artifact.mjs dist/release/win-unpacked

      - name: Verify code signature
        if: ${{ env.HAS_WINDOWS_CERT == 'true' }}
        shell: pwsh
        run: scripts/release/verify-windows-signing.ps1 dist/release/win-unpacked/dociai.exe

      - name: Checksums + release manifest
        run: node scripts/release/generate-checksums.mjs

      - name: Remove decoded certificate
        if: always()
        shell: pwsh
        run: |
          $path = Join-Path $env:RUNNER_TEMP 'dociai-signing.pfx'
          if (Test-Path $path) { Remove-Item -Force $path }

      - name: Upload checksums + manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-windows-manifest-${{ github.run_id }}
          path: |
            dist/release/*.sha256
            dist/release/release-manifest.json
          if-no-files-found: warn
          retention-days: 14
          overwrite: true
      # See the equivalent step in package-macos above for why this is gated/overwrite:true.
      - name: Upload packaged artifacts
        if: ${{ inputs.upload_packages == true }}
        uses: actions/upload-artifact@v4
        with:
          name: package-windows-artifacts-${{ github.run_id }}
          path: |
            dist/release/*.zip
            dist/release/*.exe
            dist/release/*.msi
          if-no-files-found: error
          retention-days: 14
          overwrite: true
