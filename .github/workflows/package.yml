name: Package

# Builds and verifies the electron-builder artifacts from #72 with the #73 signing pipeline
# layered on top. Every signing/notarization step is gated on the corresponding secret being
# present, so a pull request from a fork (which GitHub Actions never exposes repository secrets
# to) automatically takes the unsigned fallback path documented in docs/signing.md — no separate
# "is this a fork" check is needed anywhere below.
#
# Split out from ci.yml (which stays fast/cheap on ubuntu-latest) because macOS/Windows runners
# are materially more expensive; if that cost becomes a concern, gate this workflow's
# `pull_request` trigger behind a label or path filter without touching the job bodies below.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dociai-package-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  package-macos:
    name: package-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci

      - name: Signing status
        run: node scripts/release/print-signing-status.mjs
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Mask before anything else in this job can touch the raw values.
      - name: Mask macOS signing secrets
        if: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 != '' }}
        run: |
          echo "::add-mask::${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}"
          echo "::add-mask::${{ secrets.MACOS_CERTIFICATE_PASSWORD }}"
          echo "::add-mask::${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"

      - name: Set up temporary keychain
        if: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 != '' }}
        run: scripts/release/setup-macos-keychain.sh setup
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Build + package (arm64 + x64)
        run: npm run electron:package
        env:
          # Signing: CSC_IDENTITY_AUTO_DISCOVERY (default on) finds the identity imported above.
          # Notarization: consumed by scripts/release/notarize.mjs's afterSign hook.
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify artifact contents (arm64)
        run: node scripts/release/verify-artifact.mjs dist/release/mac-arm64/dociai.app
      - name: Verify artifact contents (x64)
        run: node scripts/release/verify-artifact.mjs dist/release/mac/dociai.app

      - name: Verify code signature (arm64)
        if: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 != '' }}
        run: scripts/release/verify-macos-signing.sh dist/release/mac-arm64/dociai.app
      - name: Verify code signature (x64)
        if: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 != '' }}
        run: scripts/release/verify-macos-signing.sh dist/release/mac/dociai.app

      - name: Packaged app smoke (host arch)
        env:
          TEST_ARTIFACTS_DIR: ${{ github.workspace }}/test-results/package-macos
        run: node scripts/release/smoke-packaged.mjs

      - name: Checksums + release manifest
        run: node scripts/release/generate-checksums.mjs

      - name: Clean up temporary keychain
        if: always()
        run: scripts/release/setup-macos-keychain.sh cleanup

      - name: Upload checksums + manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-macos-manifest-${{ github.run_id }}
          path: |
            dist/release/*.sha256
            dist/release/release-manifest.json
          if-no-files-found: warn
          retention-days: 14
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: package-macos-diagnostics-${{ github.run_id }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 14

  package-windows:
    name: package-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci

      - name: Signing status
        run: node scripts/release/print-signing-status.mjs
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}

      - name: Mask Windows signing secrets
        if: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 != '' }}
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}"
          echo "::add-mask::${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"

      - name: Decode signing certificate
        if: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64)
          $path = Join-Path $env:RUNNER_TEMP 'dociai-signing.pfx'
          [IO.File]::WriteAllBytes($path, $bytes)
          "CSC_LINK=$path" >> $env:GITHUB_ENV
          "CSC_KEY_PASSWORD=$env:WINDOWS_CERTIFICATE_PASSWORD" >> $env:GITHUB_ENV
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Build + package
        run: npm run electron:package

      - name: Verify artifact contents
        run: node scripts/release/verify-artifact.mjs dist/release/win-unpacked

      - name: Verify code signature
        if: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 != '' }}
        shell: pwsh
        run: scripts/release/verify-windows-signing.ps1 dist/release/win-unpacked/dociai.exe

      - name: Checksums + release manifest
        run: node scripts/release/generate-checksums.mjs

      - name: Remove decoded certificate
        if: always()
        shell: pwsh
        run: |
          $path = Join-Path $env:RUNNER_TEMP 'dociai-signing.pfx'
          if (Test-Path $path) { Remove-Item -Force $path }

      - name: Upload checksums + manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-windows-manifest-${{ github.run_id }}
          path: |
            dist/release/*.sha256
            dist/release/release-manifest.json
          if-no-files-found: warn
          retention-days: 14
