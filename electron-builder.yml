# Electron packager config (#72). See docs/adr/electron-packager.md for the tool choice.
#
# `directories.app: dist/electron` uses electron-builder's "two package.json" layout:
# `scripts/electron/build.mjs` produces a self-contained app directory (Main/Preload bundled by
# esbuild, `electron` left external, static Renderer assets copied, plus its own minimal
# package.json). Root devDependencies never enter the asar.
appId: com.dociai.desktop
productName: dociai
executableName: dociai
copyright: "Copyright (c) dociai contributors"

directories:
  app: dist/electron
  output: dist/release
  buildResources: build

# Main/Preload/Renderer output (dist/electron) is packed into app.asar as-is; esbuild bundles
# everything Main/Preload need (externals are only `electron`, runtime-provided, and
# `node-llama-cpp` (#45), kept external so it's never silently inlined). `dist/electron` itself has
# no node_modules of its own (scripts/electron/build.mjs never copies one there) — but
# electron-builder does its OWN separate dependency walk (via @electron/rebuild's npm workspace-root
# detection, since package.json has a `workspaces` field) independently of `directories.app`, and
# — unprompted — pulls the ENTIRE real root node_modules tree for every root `dependencies` entry
# (node-llama-cpp, electron-updater, ws) plus their full transitive graphs into app.asar/
# app.asar.unpacked, duplicating what esbuild already inlined. Confirmed the hard way:
# scripts/release/verify-artifact.mjs's "no bare node_modules/ under Resources" check failed with
# 1000+ forbidden files against a real package.yml CI run, the first time that workflow could run
# at all (it previously never validated as a workflow file, so this had gone completely undetected
# since #45/#72). `"!node_modules/**"` below is the actual fix, not a narrower per-package
# exclusion: it enforces this file's own stated intent ("Root devDependencies never enter the
# asar") for every current and future root dependency, not just the ones that happened to get
# caught. Nothing here is currently loaded from a packaged app's node_modules at runtime — Main/
# Preload are fully self-contained bundles (main.cjs/preload.cjs), and native binaries (node-
# llama-cpp) go through the separate build/native/ -> extraResources mechanism below once #50
# actually populates it (native-loader.ts still does a plain `import("node-llama-cpp")`, which a
# packaged app can't resolve either way today — local-llm already silently reports "unavailable"
# there, see native-loader.ts's own header comment; this exclusion doesn't change that, it just
# stops the unusable copy from being bundled in the first place).
asar: true
files:
  - "**/*"
  - "!**/*.map"
  - "!node_modules/**"
  - "!**/node_modules/**"

# Everything here lives outside app.asar, at <resources>/, so it stays readable without unpacking
# the archive and so future native binaries never end up inside it.
extraResources:
  - from: build/generated/build-info.json
    to: build-info.json
  - from: build/generated/licenses.json
    to: licenses.json
  - from: build/native
    to: native

# `dociai://` is already registered in-process (electron/main/index.ts) for loading packaged
# Renderer assets; declaring it here keeps OS-level protocol registration consistent for any
# future deep-link use.
protocols:
  - name: dociai
    schemes:
      - dociai

mac:
  category: public.app-category.utilities
  icon: build/icons/icon.icns
  target:
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  # electron-builder auto-discovers these two paths by convention, but they're named explicitly
  # so a future electron-builder upgrade changing that convention can't silently drop them.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # electron-builder ships a built-in notarize step (@electron/notarize, triggered automatically
  # once APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID or APPLE_API_KEY* env vars are set).
  # It's disabled here because scripts/release/notarize.mjs (wired below as `afterSign`) performs
  # notarization submit/wait/staple itself via `xcrun notarytool`/`xcrun stapler` directly — see
  # docs/signing.md for why. Leaving the built-in step enabled too would notarize twice.
  notarize: false
  extendInfo:
    # src/mic-monitor.js getUserMedia (#73 追加TODO): without both this Info.plist string and
    # build/entitlements.mac.plist's com.apple.security.device.audio-input, packaged (non-dev)
    # builds fail to acquire the microphone.
    NSMicrophoneUsageDescription: マイク入力の音量を検知し、発話区間に応じてAIコメント生成を連動させるために使用します。
    # #117 (desktopCapturer化) はまだmainへmergeされていない。このInfo.plistキーだけを先に
    # 用意しておく (#73 追加TODO の「フックだけ用意」): declaring it now is inert — it only takes
    # effect the first time some code actually requests screen-recording access, which doesn't
    # exist yet. The actual first-run "画面収録" permission UI/guidance is left to a #117
    # follow-up once desktopCapturer/getDisplayMedia screen-source selection lands on main.
    NSScreenCaptureUsageDescription: 配信画面を共有するために画面収録を使用します。

win:
  icon: build/icons/icon.ico
  target:
    # zip: manual/portable download (kept — unrelated to auto-update). nsis: required for
    # electron-updater's Windows auto-update path (NsisUpdater) — a bare zip can't be
    # auto-installed. See the top-level `nsis:` block below for why oneClick/perMachine are set the
    # way they are; both targets share this file's win.signtoolOptions signing config.
    - target: zip
      arch:
        - x64
    - target: nsis
      arch:
        - x64
  # Certificate injection (#73 「Windows certificate注入方式を決定」): CSC_LINK/CSC_KEY_PASSWORD
  # env vars, populated by .github/workflows/package.yml from the WINDOWS_CERTIFICATE_PFX_BASE64/
  # WINDOWS_CERTIFICATE_PASSWORD secrets (decoded to a workflow-local temp .pfx file, deleted
  # after the build step). electron-builder reads CSC_LINK/CSC_KEY_PASSWORD itself
  # (app-builder-lib/out/winPackager.js) — unlike macOS there is no OS-level "keychain" to import
  # into, so no separate setup/cleanup script is needed here (contrast
  # scripts/release/setup-macos-keychain.sh). When those env vars are unset (fork PRs, local
  # dev), electron-builder silently produces an unsigned build unless
  # `signtoolOptions.forceCodeSigning` were true, which it isn't.
  #
  # signtoolOptions.publisherName is intentionally NOT set here yet — see the top-level `nsis:`
  # block below for why it matters for auto-update specifically, and the hard release.yml gate that
  # exists because of it.
  signtoolOptions:
    signingHashAlgorithms:
      - sha256
    rfc3161TimeStampServer: http://timestamp.digicert.com

# `nsis` is a top-level key (a sibling of `win`, not nested under it — electron-builder's schema
# rejects it there; confirmed against app-builder-lib's own scheme.json after first getting this
# wrong and hitting its "configuration.win should be one of these: null" validation error).
#
# oneClick:true (not the "assisted" wizard): quitAndInstall() (update-service.ts) already runs
# non-silently and relaunches after install, and the app-side confirm dialog (src/app/boot.js) is
# the actual user consent step — a multi-page install wizard on top of that would be a redundant
# second confirmation, and a genuinely dangerous one for this app specifically: if the operator
# isn't watching (a live stream can run for hours unattended between checks), an assisted-mode
# wizard sits waiting for welcome/install-mode/directory/install clicks with the OLD version
# already quit — worst possible mid-broadcast state. oneClick also collapses away the
# assisted-mode's per-user/per-machine install-mode picker entirely: perMachine:false below is
# otherwise only a *default* a user could override into an admin-elevated per-machine install in
# assisted mode, which would make every later auto-update silently require UAC elevation
# (electron-updater has no pre-elevation path for that case — see NsisUpdater's EACCES retry
# fallback). oneClick:true removes that whole failure class.
#
# perMachine:false (per-user install, no admin rights needed): matches not having a Windows
# signing certificate yet either — no reason to add UAC friction before there's even a trusted
# signer. Revisit together with the cert if that changes.
#
# signtoolOptions.publisherName (NOT win.publisherName — that key doesn't exist in electron-builder
# 26's schema; it moved under win.signtoolOptions, confirmed the hard way by first writing it wrong
# and hitting the same "configuration.win should be one of these: null" validation error the nsis:
# nesting mistake above did) is intentionally NOT set here yet — there is no real Windows signing
# certificate to name (see docs/signing.md). In electron-builder 26, when a real certificate IS
# configured (CSC_LINK) and `verifyUpdateCodeSignature` isn't explicitly set to `false` (its default
# is `true`), the publisherName that ends up in `app-update.yml` gets auto-computed from the
# certificate's own CN — so this normally self-heals the moment a certificate is added, without
# anyone needing to touch this file. release.yml's validate-tag job still has a hard gate requiring
# `win.signtoolOptions.publisherName` to be set explicitly alongside the certificate secret anyway,
# as a belt-and-suspenders check against the case where `verifyUpdateCodeSignature` is ever set to
# `false` (which would otherwise silently disable Windows update-signature verification entirely).
nsis:
  oneClick: true
  perMachine: false

artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

# Corrects build-info.json's platform/arch for the target actually packaged, since a single host
# can cross-build multiple mac archs (see scripts/release/after-pack.mjs).
afterPack: scripts/release/after-pack.mjs

# macOS-only in practice: electron-builder calls `afterSign` for every platform once signing
# actually happened (electron-builder skips the call entirely for an unsigned build — see
# scripts/release/notarize.mjs's own comment), and notarize.mjs no-ops immediately for non-darwin
# targets. Runs after codesign has already applied build/entitlements.mac.plist, so notarization
# submit/wait/staple never touches file contents that were part of the signature — only the
# stapled ticket is added afterward, which Apple's stapler is designed not to invalidate signing
# over (see docs/signing.md "package後にfileを書き換えない工程順").
afterSign: scripts/release/notarize.mjs

# userData (config/secrets/models/logs) is resolved at runtime via app.getPath("userData")
# (electron/main/paths.ts) and is never copied into the app directory or referenced here, so
# app updates never touch it.
#
# Auto-update (electron-updater, macOS + Windows — see electron/main/services/update/
# update-service.ts): reuses the existing GitHub Releases the tag-triggered release pipeline
# already publishes to, rather than standing up separate update infrastructure. This config only
# makes electron-builder EMIT the `latest-mac.yml`/`latest.yml`/*.blockmap update metadata that
# electron-updater's GitHub provider reads — it does not make electron-builder itself talk to
# GitHub. `electron:package`'s `--publish never` flag (package.json) is what enforces that; the
# existing `gh release create` step in .github/workflows/release.yml uploads the generated
# metadata files as ordinary release assets alongside the zip/dmg/nsis installer it already
# uploads. Do not add a GH_TOKEN to the package.yml build steps — its absence is what keeps
# electron-builder from ever attempting to publish on its own even if `--publish never` were
# dropped by mistake.
publish:
  provider: github
  owner: azumag
  repo: dociai
